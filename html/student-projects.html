<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Đồ Án Của Tôi – FBU Student Portal</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ─── Page Header ─── */
    .proj-page-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .proj-page-heading {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px; font-weight: 700; letter-spacing: -0.4px;
    }
    .proj-page-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }

    /* ─── Project Detail Card ─── */
    .proj-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px; overflow: hidden;
    }

    /* Top banner */
    .proj-card-banner {
      position: relative; overflow: hidden;
      background: linear-gradient(135deg, #0D1525 0%, #0A1020 100%);
      padding: 32px 32px 28px;
      border-bottom: 1px solid var(--border);
    }
    .proj-card-banner::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 280px; height: 280px;
      background: radial-gradient(circle, rgba(91,124,246,0.15), transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .proj-banner-top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .proj-badge-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px; flex-wrap: wrap; position: relative; z-index: 1;
    }

    .proj-big-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 600; line-height: 1.3;
      margin-bottom: 10px; letter-spacing: -0.3px;
      position: relative; z-index: 1;
    }
    .proj-desc-text {
      font-size: 14px; color: var(--text2); line-height: 1.8;
      max-width: 640px; position: relative; z-index: 1;
    }

    /* Info grid */
    .proj-info-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0;
      background: var(--bg3);
      border-top: 1px solid var(--border);
    }
    @media(max-width:900px){ .proj-info-grid { grid-template-columns: 1fr 1fr; } }

    .proj-info-box {
      padding: 18px 22px;
      border-right: 1px solid var(--border);
      transition: background .15s;
    }
    .proj-info-box:last-child { border-right: none; }
    .proj-info-box:hover { background: var(--bg4); }

    .proj-info-key {
      font-size: 9px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text3); margin-bottom: 7px;
    }
    .proj-info-val { font-size: 14px; font-weight: 600; color: var(--text); }

    /* Submission section */
    .proj-submit-section {
      padding: 24px 30px; border-top: 1px solid var(--border);
    }
    .proj-sub-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
    }
    .proj-sub-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }
    .proj-sub-title i { color: var(--accent); }

    .submitted-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 6px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }
    .submitted-badge.yes {
      background: rgba(16,185,129,.1);
      border: 1px solid rgba(16,185,129,.2);
      color: var(--green);
    }
    .submitted-badge.no {
      background: rgba(245,158,11,.1);
      border: 1px solid rgba(245,158,11,.2);
      color: var(--yellow);
    }

    .submission-detail {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 13px; padding: 16px 18px;
      font-size: 13px; color: var(--text2); line-height: 1.8;
    }
    .submission-detail strong { color: var(--text); }

    /* Action bar */
    .proj-action-bar {
      display: flex; gap: 10px; flex-wrap: wrap;
      padding: 20px 30px; border-top: 1px solid var(--border);
      background: rgba(255,255,255,.01);
    }

    /* Expandable panels */
    .proj-panel {
      margin: 0 20px 20px;
      background: var(--bg3);
      border: 1px solid rgba(91,124,246,0.2);
      border-radius: 18px; padding: 26px;
      display: none;
      animation: panelSlide .25s ease;
    }
    .proj-panel.open { display: block; }
    @keyframes panelSlide { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .proj-panel-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 22px;
    }
    .proj-panel-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(91,124,246,.1); color: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .proj-panel-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }

    /* Form inputs for panels */
    .panel-input {
      background: var(--bg2); border: 1.5px solid var(--border);
      border-radius: 11px; padding: 11px 16px;
      color: var(--text); font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px;
      outline: none; transition: border .2s, box-shadow .2s; width: 100%;
    }
    .panel-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,124,246,.1); }

    /* ─── Empty State ─── */
    .proj-empty {
      text-align: center; padding: 80px 32px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px;
    }
    .proj-empty-icon {
      width: 88px; height: 88px; border-radius: 24px;
      background: linear-gradient(135deg, rgba(91,124,246,.12), rgba(139,92,246,.08));
      border: 1px solid rgba(91,124,246,.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: var(--accent); margin: 0 auto 24px;
    }
    .proj-empty-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600; margin-bottom: 10px; }
    .proj-empty-sub { color: var(--text2); font-size: 14px; margin-bottom: 28px; max-width: 360px; margin-left: auto; margin-right: auto; }
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">F</div>
      <div class="logo-text">
        <span class="logo-name">FBU</span>
        <span class="logo-sub">Student Portal</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Menu</span>
      <a href="student.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Trang chính</span></a>
      <a href="student-projects.html" class="nav-item active"><i class="fa-solid fa-folder-open"></i><span>Đồ Án của tôi</span></a>
      <a href="student-grading.html" class="nav-item"><i class="fa-solid fa-star-half-stroke"></i><span>Điểm của tôi</span></a>
      <a href="student-profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Hồ sơ</span></a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-inner">
        <div class="user-avatar">SV</div>
        <div class="user-info">
          <span class="user-name">Sinh Viên</span>
          <span class="user-role">Student</span>
        </div>
      </div>
      <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="logout()">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div class="top-bar-title">
        <h1>Đồ Án Của Tôi</h1>
        <p>Quản lý và theo dõi tiến độ đồ án</p>
      </div>
      <div class="top-bar-actions">
        <button class="btn btn-primary" onclick="openNewProjectModal()">
          <i class="fa-solid fa-plus"></i> Nộp đề tài mới
        </button>
      </div>
    </header>

    <div class="page-body">
      <div id="projectContent"></div>
    </div>
  </main>
</div>

<!-- Modal Thêm đồ án -->
<div class="modal-overlay" id="modalNewProject">
  <div class="modal" style="max-width:640px;width:100%;">
    <div class="modal-header">
      <h3>Nộp đề tài mới</h3>
      <button class="modal-close" onclick="closeModal('modalNewProject')"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="form-group">
      <label>Tiêu đề đề tài <span style="color:var(--red)">*</span></label>
      <input class="form-control" id="newTitle" placeholder="Nhập tiêu đề đồ án..."/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label>Loại đề tài <span style="color:var(--red)">*</span></label>
        <select class="form-control" id="newCategory"></select>
      </div>
      <div class="form-group">
        <label>Giảng viên HD <span style="color:var(--red)">*</span></label>
        <select class="form-control" id="newTeacher"></select>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div class="form-group">
        <label>Ngày bắt đầu</label>
        <input class="form-control" id="newStart" type="date"/>
      </div>
      <div class="form-group">
        <label>Deadline <span style="color:var(--red)">*</span></label>
        <input class="form-control" id="newDeadline" type="date"/>
      </div>
    </div>
    <div class="form-group">
      <label>Mô tả đề tài <span style="color:var(--red)">*</span></label>
      <textarea class="form-control" id="newDesc" rows="4" placeholder="Mô tả nội dung và mục tiêu..." style="resize:vertical"></textarea>
    </div>
    <div class="form-group">
      <label>Link nộp / File</label>
      <input class="form-control" id="newLink" placeholder="https://... hoặc tên file"/>
    </div>
    <div class="form-group">
      <label>Ghi chú</label>
      <textarea class="form-control" id="newNote" rows="2" style="resize:vertical"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modalNewProject')">Hủy</button>
      <button class="btn btn-primary" onclick="saveNewProjectSubmission()">
        <i class="fa-solid fa-paper-plane"></i> Gửi đề tài
      </button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
    <script src="/js/data.js"></script>
<script src="/js/main.js"></script>
<script>
let currentStudent = null;
let currentProject = null;

function renderProjectContent() {
  const session = getSessionData();
  if (!session) return;
  currentStudent = FBU.students.find(s => s.email === session.email);
  const out = document.getElementById('projectContent');
  if (!currentStudent) { out.innerHTML = '<p>Không tìm thấy thông tin.</p>'; return; }
  currentProject = currentStudent.projectId ? FBU.getProject(currentStudent.projectId) : null;

  if (!currentProject) {
    out.innerHTML = `
      <div class="proj-empty">
        <div class="proj-empty-icon"><i class="fa-solid fa-folder-plus"></i></div>
        <div class="proj-empty-title">Chưa có đồ án</div>
        <div class="proj-empty-sub">Bạn chưa có đồ án nào. Nộp đề tài để bắt đầu quá trình nghiên cứu.</div>
        <button class="btn btn-primary" onclick="openNewProjectModal()">
          <i class="fa-solid fa-plus"></i> Nộp đề tài ngay
        </button>
      </div>`;
    return;
  }

  const teacher = FBU.getTeacher(currentProject.teacherId);
  const statusInfo = FBU.statusLabel[currentProject.status] || { label: currentProject.status, cls: 'tag-gray' };
  const isSubmitted = !!currentProject.submitted;

  out.innerHTML = `
    <div class="proj-card">
      <!-- Banner -->
      <div class="proj-card-banner">
        <div class="proj-banner-top-bar"></div>
        <div class="proj-badge-row">
          <span class="tag ${statusInfo.cls}">${statusInfo.label}</span>
          <span class="tag tag-gray">${currentProject.category}</span>
          <span class="tag tag-gray"><i class="fa-solid fa-hashtag" style="font-size:9px;opacity:0.7"></i> ${currentProject.id}</span>
        </div>
        <h2 class="proj-big-title">${currentProject.title}</h2>
        <p class="proj-desc-text">${currentProject.desc}</p>
      </div>

      <!-- Info Grid -->
      <div class="proj-info-grid">
        <div class="proj-info-box">
          <div class="proj-info-key">Giảng viên HD</div>
          <div class="proj-info-val">${teacher ? teacher.name : 'Chưa có'}</div>
        </div>
        <div class="proj-info-box">
          <div class="proj-info-key">Deadline</div>
          <div class="proj-info-val" style="color:var(--yellow)">${currentProject.deadline}</div>
        </div>
        <div class="proj-info-box">
          <div class="proj-info-key">Điểm số</div>
          <div class="proj-info-val" style="color:var(--green)">${currentProject.score !== null ? currentProject.score : '—'}</div>
        </div>
        <div class="proj-info-box">
          <div class="proj-info-key">Ngày bắt đầu</div>
          <div class="proj-info-val">${currentProject.startDate || '—'}</div>
        </div>
      </div>

      <!-- Submission -->
      <div class="proj-submit-section">
        <div class="proj-sub-header">
          <div class="proj-sub-title"><i class="fa-solid fa-cloud-arrow-up"></i> Tình trạng nộp bài</div>
          <span class="submitted-badge ${isSubmitted ? 'yes' : 'no'}">
            <i class="fa-solid ${isSubmitted ? 'fa-circle-check' : 'fa-hourglass-half'}"></i>
            ${isSubmitted ? 'Đã nộp' : 'Chưa nộp'}
          </span>
        </div>
        ${isSubmitted && currentProject.submissionLink
          ? `<div class="submission-detail">
               <strong>Link bài nộp:</strong> ${currentProject.submissionLink}
               ${currentProject.submissionNote ? `<br><strong>Ghi chú:</strong> ${currentProject.submissionNote}` : ''}
               ${currentProject.submittedAt ? `<br><span style="color:var(--text3);font-size:12px">Nộp lúc: ${new Date(currentProject.submittedAt).toLocaleString('vi-VN')}</span>` : ''}
             </div>`
          : `<div style="font-size:13px;color:var(--text3);padding:14px;background:var(--bg3);border-radius:12px;border:1px solid var(--border)">
               <i class="fa-solid fa-info-circle" style="margin-right:8px;color:var(--accent)"></i>
               Chưa nộp bài. Nhấn "Nộp đồ án" để upload link/file.
             </div>`}
      </div>

      <!-- Actions -->
      <div class="proj-action-bar">
        <button class="btn btn-secondary" onclick="openEditPanel()">
          <i class="fa-solid fa-pen-to-square"></i> Chỉnh sửa
        </button>
        <button class="btn btn-primary" onclick="openSubmitPanel()">
          <i class="fa-solid fa-cloud-arrow-up"></i> ${isSubmitted ? 'Cập nhật nộp' : 'Nộp đồ án'}
        </button>
        <button class="btn btn-secondary" onclick="deleteCurrentProject()" style="background:var(--red);color:#fff;">
          <i class="fa-solid fa-trash-can"></i> Xóa đồ án
        </button>
        <button class="btn btn-secondary" onclick="openNewProjectModal()" style="margin-left:auto">
          <i class="fa-solid fa-plus"></i> Đề tài mới
        </button>
      </div>
    </div>

    <!-- Edit panel -->
    <div class="proj-panel" id="editPanel">
      <div class="proj-panel-header">
        <div class="proj-panel-icon"><i class="fa-solid fa-pen-to-square"></i></div>
        <div class="proj-panel-title">Chỉnh sửa thông tin đồ án</div>
      </div>
      <div class="form-group">
        <label style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)">Tiêu đề</label>
        <input class="panel-input" id="editTitle" value="${currentProject.title}"/>
      </div>
      <div class="form-group">
        <label style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)">Loại đề tài</label>
        <input class="panel-input" id="editCategory" value="${currentProject.category}"/>
      </div>
      <div class="form-group">
        <label style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)">Mô tả</label>
        <textarea class="panel-input" id="editDesc" rows="4" style="resize:vertical">${currentProject.desc}</textarea>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        <button class="btn btn-primary" onclick="saveProjectEdits('${currentProject.id}')">
          <i class="fa-solid fa-floppy-disk"></i> Lưu thay đổi
        </button>
        <button class="btn btn-secondary" onclick="closePanels()">Hủy</button>
      </div>
    </div>

    <!-- Submit panel -->
    <div class="proj-panel" id="submitPanel">
      <div class="proj-panel-header">
        <div class="proj-panel-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
        <div class="proj-panel-title">Nộp đồ án</div>
      </div>
      <div class="form-group">
        <label style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)">Link bài nộp / File</label>
        <input class="panel-input" id="submissionLink" placeholder="https://... hoặc tên file" value="${currentProject.submissionLink || ''}"/>
      </div>
      <div class="form-group">
        <label style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3)">Ghi chú nộp</label>
        <textarea class="panel-input" id="submissionNote" rows="3" style="resize:vertical">${currentProject.submissionNote || ''}</textarea>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">
        <button class="btn btn-primary" onclick="submitProject('${currentProject.id}')">
          <i class="fa-solid fa-paper-plane"></i> Xác nhận nộp
        </button>
        <button class="btn btn-secondary" onclick="closePanels()">Hủy</button>
      </div>
    </div>`;
}

function openEditPanel() {
  document.getElementById('editPanel').classList.add('open');
  document.getElementById('submitPanel').classList.remove('open');
  document.getElementById('editPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function openSubmitPanel() {
  document.getElementById('submitPanel').classList.add('open');
  document.getElementById('editPanel').classList.remove('open');
  document.getElementById('submitPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function closePanels() {
  document.getElementById('editPanel')?.classList.remove('open');
  document.getElementById('submitPanel')?.classList.remove('open');
}

function saveProjectEdits(projectId) {
  const title = document.getElementById('editTitle').value.trim();
  const category = document.getElementById('editCategory').value.trim();
  const desc = document.getElementById('editDesc').value.trim();
  if (!title || !category || !desc) { showToast('Vui lòng điền đầy đủ thông tin.', 'error'); return; }
  const project = FBU.getProject(projectId);
  if (!project) return;
  project.title = title; project.category = category; project.desc = desc;
  project.updatedAt = new Date().toISOString();
  FBU.save(); showToast('Đã lưu thông tin đồ án.', 'success'); renderProjectContent();
}

function submitProject(projectId) {
  const link = document.getElementById('submissionLink').value.trim();
  const note = document.getElementById('submissionNote').value.trim();
  if (!link) { showToast('Vui lòng nhập link hoặc tên file nộp.', 'error'); return; }
  const project = FBU.getProject(projectId);
  if (!project) return;
  project.submissionLink = link; project.submissionNote = note;
  project.submitted = true; project.submittedAt = new Date().toISOString();
  FBU.save(); showToast('Đã nộp đồ án thành công!', 'success'); renderProjectContent();
}

function deleteCurrentProject() {
  if (!currentStudent || !currentStudent.projectId) {
    showToast('Không có đồ án nào để xóa.', 'error');
    return;
  }
  if (!confirm('Bạn có chắc chắn muốn xóa đồ án này?')) return;
  const projectId = currentStudent.projectId;
  const project = FBU.getProject(projectId);
  if (project) {
    project.students = project.students.filter((sid) => sid !== currentStudent.id);
    if (!project.students || project.students.length === 0) {
      FBU.projects = FBU.projects.filter((p) => p.id !== projectId);
    }
  }
  currentStudent.projectId = null;
  FBU.save();
  showToast('Đã xóa đồ án của bạn.', 'success');
  renderProjectContent();
}

function openNewProjectModal() {
  const catSel = document.getElementById('newCategory');
  const teacherSel = document.getElementById('newTeacher');
  catSel.innerHTML = '<option value="">Chọn loại</option>';
  teacherSel.innerHTML = '<option value="">Chọn giảng viên</option>';
  FBU.categories.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; catSel.appendChild(o); });
  FBU.teachers.forEach(t => { const o = document.createElement('option'); o.value = t.id; o.textContent = t.name; teacherSel.appendChild(o); });
  const today = new Date().toISOString().slice(0,10);
  document.getElementById('newStart').value = today;
  ['newDeadline','newTitle','newDesc','newLink','newNote'].forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  openModal('modalNewProject');
}

function saveNewProjectSubmission() {
  const title = document.getElementById('newTitle').value.trim();
  const category = document.getElementById('newCategory').value;
  const teacherId = document.getElementById('newTeacher').value;
  const startDate = document.getElementById('newStart').value;
  const deadline = document.getElementById('newDeadline').value;
  const desc = document.getElementById('newDesc').value.trim();
  const submissionLink = document.getElementById('newLink').value.trim();
  const submissionNote = document.getElementById('newNote').value.trim();
  if (!title || !category || !teacherId || !deadline) { showToast('Vui lòng điền đầy đủ thông tin bắt buộc.', 'error'); return; }
  if (!currentStudent) { showToast('Không xác định được sinh viên.', 'error'); return; }
  const newId = FBU.nextId('DA', FBU.projects);
  const project = { id: newId, title, category, teacherId, status: 'pending', score: null, startDate: startDate || new Date().toISOString().slice(0,10), deadline, desc, students: [currentStudent.id], submitted: !!submissionLink, submissionLink, submissionNote, submittedAt: submissionLink ? new Date().toISOString() : null };
  if (currentStudent.projectId) { const old = FBU.getProject(currentStudent.projectId); if(old) old.students = old.students.filter(sid => sid !== currentStudent.id); }
  FBU.projects.push(project);
  currentStudent.projectId = newId;
  FBU.save(); closeModal('modalNewProject'); showToast('Đã nộp đề tài mới thành công!', 'success'); renderProjectContent();
}

document.addEventListener('DOMContentLoaded', renderProjectContent);
</script>
</body>
</html>
