<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Báo Cáo – FBU</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }
      .kpi-box {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 12px;
        text-align: center;
      }
      .kpi-val {
        font-family: "Syne", sans-serif;
        font-size: 32px;
        font-weight: 800;
        display: block;
        line-height: 1.2;
      }
      .kpi-lbl {
        font-size: 12px;
        color: var(--text2);
        margin-top: 8px;
        display: block;
      }
      .report-section {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        margin-bottom: 28px;
      }
      .section-title {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 16px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .bar-chart {
        display: flex;
        align-items: flex-end;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        min-height: 200px;
      }
      .rep-bar-grp {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        width: 70px;
      }
      .rep-bar {
        width: 36px;
        background: var(--accent);
        border-radius: 8px 8px 4px 4px;
        transition: height 0.2s;
      }
      .rep-bar-val {
        font-weight: 700;
        font-size: 14px;
      }
      .rep-bar-lbl {
        font-size: 11px;
        color: var(--text2);
        text-align: center;
      }
      .top-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .top-item {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--bg3);
        padding: 10px 14px;
        border-radius: 12px;
      }
      .top-rank {
        width: 32px;
        height: 32px;
        background: var(--bg2);
        border-radius: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
      }
      .top-rank.gold {
        background: #fbbf24;
        color: #000;
      }
      .top-rank.silver {
        background: #9ca3af;
        color: #000;
      }
      .top-rank.bronze {
        background: #cd7f32;
        color: #fff;
      }
      .top-body {
        flex: 1;
      }
      .top-score {
        font-family: "Syne", sans-serif;
        font-weight: 800;
        font-size: 18px;
        color: var(--accent);
      }
      .export-toolbar {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
        margin-bottom: 20px;
      }
      .two-columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
      @media (max-width: 700px) {
        .two-columns {
          grid-template-columns: 1fr;
        }
        .kpi-grid {
          grid-template-columns: 1fr 1fr;
        }
      }
      .progress-track {
        height: 6px;
        background: var(--bg3);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 4px;
        width: 0%;
      }
      .tag {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 30px;
        background: var(--bg3);
      }
      .tag.green {
        background: rgba(34, 197, 94, 0.2);
        color: #22c55e;
      }
      .tag.accent {
        background: rgba(79, 110, 247, 0.2);
        color: #4f6ef7;
      }
      .tag.yellow {
        background: rgba(245, 158, 11, 0.2);
        color: #f59e0b;
      }
      .tag.red {
        background: rgba(239, 68, 68, 0.2);
        color: #ef4444;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="logo-mark">F</div>
          <div class="logo-text">
            <span class="logo-name">FBU</span
            ><span class="logo-sub">Project System</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <a href="index.html" class="nav-item"
            ><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a
          >
          <a href="students.html" class="nav-item"
            ><i class="fa-solid fa-user-graduate"></i><span>Sinh Viên</span></a
          >
          <a href="projects.html" class="nav-item"
            ><i class="fa-solid fa-folder-open"></i><span>Đồ Án</span></a
          >
          <a href="teachers.html" class="nav-item"
            ><i class="fa-solid fa-chalkboard-user"></i
            ><span>Giảng Viên</span></a
          >
          <a href="grading.html" class="nav-item"
            ><i class="fa-solid fa-star-half-stroke"></i
            ><span>Duyệt Điểm</span></a
          >
          <a href="accounts.html" class="nav-item"
            ><i class="fa-solid fa-users-gear"></i><span>Tài Khoản</span></a
          >
          <a href="reports.html" class="nav-item active"
            ><i class="fa-solid fa-chart-pie"></i><span>Báo Cáo</span></a
          >
        </nav>
        <div class="sidebar-user">
          <div class="user-avatar">AD</div>
          <div class="user-info">
            <span class="user-name">Admin FBU</span
            ><span class="user-role">Quản trị viên</span>
          </div>
          <button
            class="btn btn-secondary"
            style="width: 100%; margin-top: 8px"
            onclick="logout()"
          >
            Đăng xuất
          </button>
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-bar">
          <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="top-bar-title">
            <h1>Báo Cáo Thống Kê</h1>
            <p>Tổng quan hệ thống đồ án</p>
          </div>
          <div class="top-bar-actions">
            <button class="btn btn-secondary" onclick="exportCSV()">
              <i class="fa-solid fa-file-csv"></i> Xuất CSV Đồ Án
            </button>
            <button class="btn btn-secondary" onclick="exportStudentCSV()">
              <i class="fa-solid fa-table-list"></i> Xuất CSV Sinh Viên
            </button>
          </div>
        </header>

        <div class="page-body">
          <!-- KPI Row -->
          <div class="kpi-grid" id="kpiRow"></div>

          <div class="two-columns">
            <!-- Left column -->
            <div>
              <!-- Phân bố theo loại đồ án -->
              <div class="report-section">
                <div class="section-title">📂 Đồ án theo loại</div>
                <div class="bar-chart" id="catBars"></div>
              </div>

              <!-- Top 5 điểm cao nhất -->
              <div class="report-section">
                <div class="section-title">🏆 Top 5 đồ án điểm cao nhất</div>
                <div class="top-list" id="topProjects"></div>
              </div>
            </div>

            <!-- Right column -->
            <div>
              <!-- Tải trọng giảng viên -->
              <div class="report-section">
                <div class="section-title">👨‍🏫 Số lượng đồ án / Giảng viên</div>
                <div id="teacherLoad"></div>
              </div>

              <!-- Trạng thái đồ án -->
              <div class="report-section">
                <div class="section-title">📊 Trạng thái đồ án</div>
                <div id="statusSummary"></div>
              </div>

              <!-- Sinh viên theo lớp -->
              <div class="report-section">
                <div class="section-title">👩‍🎓 Số sinh viên theo lớp</div>
                <div class="bar-chart" id="classBars"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/reports.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
