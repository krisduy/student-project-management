<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Hồ Sơ – FBU Student Portal</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ─── Profile Layout ─── */
    .profile-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 20px; align-items: start;
    }
    @media(max-width:900px){ .profile-layout { grid-template-columns: 1fr; } }

    /* ─── Avatar Card ─── */
    .avatar-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px; padding: 32px 28px;
      text-align: center; position: sticky; top: 80px;
    }

    .avatar-ring {
      position: relative; width: 110px; height: 110px;
      margin: 0 auto 20px;
    }
    .avatar-ring-svg { position: absolute; inset: 0; width: 110px; height: 110px; transform: rotate(-90deg); }
    .avatar-ring-track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }
    .avatar-ring-fill { fill: none; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 0 360; transition: stroke-dasharray 1.4s cubic-bezier(.4,0,.2,1); }

    .avatar-img {
      position: absolute; top: 8px; left: 8px;
      width: 94px; height: 94px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px; font-weight: 700; color: #fff;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(91,124,246,0.35);
    }
    .avatar-img img { width: 100%; height: 100%; object-fit: cover; }

    .avatar-upload-btn {
      position: absolute; bottom: 0; right: 0;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; cursor: pointer;
      box-shadow: 0 2px 8px rgba(91,124,246,0.5);
      transition: transform .2s;
    }
    .avatar-upload-btn:hover { transform: scale(1.1); }

    .avatar-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 19px; font-weight: 700; margin-bottom: 4px;
    }
    .avatar-email { font-size: 13px; color: var(--text3); margin-bottom: 16px; }
    .avatar-badge {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 16px; border-radius: 20px; margin-bottom: 24px;
      background: rgba(91,124,246,.1); border: 1px solid rgba(91,124,246,.18);
      color: var(--accent); font-size: 12px; font-weight: 600;
    }

    /* Mini stats */
    .avatar-stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .av-stat {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 12px; text-align: center;
      transition: border-color .2s;
    }
    .av-stat:hover { border-color: var(--border2); }
    .av-stat-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 700; display: block; line-height: 1;
    }
    .av-stat-lbl { font-size: 11px; color: var(--text3); margin-top: 5px; display: block; }
    .av-stat.full { grid-column: span 2; }
    .av-stat.full .av-stat-num { font-size: 14px; }

    /* ─── Form Card ─── */
    .form-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px; overflow: hidden;
    }

    .form-section {
      padding: 26px 30px;
      border-bottom: 1px solid var(--border);
    }
    .form-section:last-child { border-bottom: none; }

    .form-section-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 22px;
    }
    .form-section-icon {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: rgba(91,124,246,.1); color: var(--accent);
    }
    .form-section-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 600;
    }
    .form-section-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    @media(max-width:700px){ .field-grid { grid-template-columns: 1fr; } }

    .sv-field { margin-bottom: 18px; }
    .sv-field label {
      display: block; font-size: 10px; font-weight: 700;
      color: var(--text3); letter-spacing: 1.5px;
      text-transform: uppercase; margin-bottom: 8px;
    }

    .sv-input {
      width: 100%; padding: 12px 16px;
      background: var(--bg3); border: 1.5px solid var(--border);
      border-radius: 11px; color: var(--text);
      font-family: 'Be Vietnam Pro', sans-serif; font-size: 14px;
      outline: none; transition: border .2s, box-shadow .2s;
    }
    .sv-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(91,124,246,.1); }
    .sv-input:hover:not(:focus):not(:read-only) { border-color: var(--border2); }
    .sv-input:read-only { opacity: 0.45; cursor: not-allowed; }
    select.sv-input { cursor: pointer; }

    /* Input with icon */
    .sv-input-wrap { position: relative; }
    .sv-input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    .sv-input-wrap .sv-input { padding-left: 40px; }

    /* Status indicator */
    .status-row { display: flex; gap: 10px; }
    .status-opt {
      flex: 1; padding: 12px 14px; border-radius: 11px;
      background: var(--bg3); border: 1.5px solid var(--border);
      cursor: pointer; text-align: center; transition: all .2s;
      font-size: 12px; font-weight: 600; color: var(--text2);
    }
    .status-opt:hover { border-color: var(--border2); color: var(--text); }
    .status-opt.selected-active { background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.3); color: var(--green); }
    .status-opt.selected-warning { background: rgba(245,158,11,.1); border-color: rgba(245,158,11,.3); color: var(--yellow); }
    .status-opt.selected-suspended { background: rgba(244,63,94,.1); border-color: rgba(244,63,94,.3); color: var(--red); }
    .status-opt i { display: block; font-size: 18px; margin-bottom: 6px; }

    /* Project preview */
    .project-preview {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
      display: flex; align-items: center; gap: 14px;
      transition: border-color .2s;
    }
    .project-preview:hover { border-color: var(--border2); }
    .project-preview-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(91,124,246,.1); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }
    .project-preview-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .project-preview-meta { font-size: 12px; color: var(--text3); }

    /* Form actions */
    .form-actions {
      padding: 22px 30px;
      background: rgba(91,124,246,.03);
      border-top: 1px solid var(--border);
      display: flex; gap: 12px; flex-wrap: wrap; align-items: center;
    }
    .form-actions-left { flex: 1; }
    .save-hint { font-size: 12px; color: var(--text3); }

    /* Save success indicator */
    .save-ok {
      display: none; align-items: center; gap: 7px;
      font-size: 12px; color: var(--green);
      animation: fadeIn .3s ease;
    }
    .save-ok.show { display: flex; }
    .profile-hero {
      position: relative;
      overflow: hidden;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
    }
    .profile-hero::before {
      content: '';
      position: absolute;
      inset: 0 0 auto 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(91,124,246,.55), rgba(16,185,129,.35), transparent);
    }
    .profile-hero-main {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }
    .profile-hero-avatar {
      width: 70px;
      height: 70px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 8px 28px rgba(91,124,246,.28);
    }
    .profile-hero-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-hero-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .profile-hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--text2);
      font-size: 12px;
    }
    .profile-hero-meta span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      border-radius: 20px;
      background: var(--bg3);
      border: 1px solid var(--border);
    }
    .profile-hero-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .profile-metric-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .profile-metric {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }
    .profile-metric-icon {
      width: 44px;
      height: 44px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(91,124,246,.12);
      border: 1px solid rgba(91,124,246,.18);
      color: var(--accent);
      flex-shrink: 0;
    }
    .profile-metric-value {
      display: block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }
    .profile-metric-label {
      display: block;
      margin-top: 5px;
      font-size: 11px;
      color: var(--text3);
    }
    .profile-layout {
      grid-template-columns: 320px 1fr;
    }
    .avatar-card,
    .form-card {
      border-radius: var(--radius-lg);
    }
    .avatar-card {
      top: 88px;
      padding-top: 28px;
    }
    .avatar-card::before,
    .form-card::before {
      content: '';
      display: block;
      height: 1px;
      margin: -32px -28px 28px;
      background: linear-gradient(90deg, transparent, rgba(91,124,246,.45), transparent);
    }
    .form-card::before {
      margin: 0;
      height: 1px;
    }
    .form-section:first-of-type { padding-top: 28px; }
    .profile-detail-list {
      display: grid;
      gap: 10px;
      margin-top: 20px;
      text-align: left;
    }
    .profile-detail-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 12px;
      color: var(--text2);
    }
    .profile-detail-item i {
      color: var(--accent);
      width: 16px;
      text-align: center;
    }
    .project-preview {
      align-items: flex-start;
    }
    .project-preview-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    textarea.sv-input {
      min-height: 92px;
      resize: vertical;
      line-height: 1.6;
    }
    @media(max-width:1100px){ .profile-metric-grid { grid-template-columns: repeat(2, 1fr); } }
    @media(max-width:760px){
      .profile-hero { grid-template-columns: 1fr; }
      .profile-hero-actions { justify-content: flex-start; }
      .profile-metric-grid { grid-template-columns: 1fr; }
      .profile-hero-main { align-items: flex-start; }
      .profile-hero-title { font-size: 20px; }
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">F</div>
      <div class="logo-text">
        <span class="logo-name">FBU</span>
        <span class="logo-sub">Student Portal</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Menu</span>
      <a href="student.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Trang chính</span></a>
      <a href="student-projects.html" class="nav-item"><i class="fa-solid fa-folder-open"></i><span>Đồ Án của tôi</span></a>
      <a href="student-grading.html" class="nav-item"><i class="fa-solid fa-star-half-stroke"></i><span>Điểm của tôi</span></a>
      <a href="student-profile.html" class="nav-item active"><i class="fa-solid fa-user"></i><span>Hồ sơ</span></a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-inner">
        <div class="user-avatar" id="sidebarAvatar">SV</div>
        <div class="user-info">
          <span class="user-name" id="sidebarName">Sinh Viên</span>
          <span class="user-role">Student</span>
        </div>
      </div>
      <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="logout()">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div class="top-bar-title">
        <h1>Hồ Sơ Cá Nhân</h1>
        <p>Thông tin và cài đặt tài khoản</p>
      </div>
    </header>

    <div class="page-body">
      <div id="profileContent"></div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
    <script src="/js/data.js"></script>
<script src="/js/main.js"></script>
<script>
let currentStudent = null;
let studentAvatarDataUrl = null;

function getInitials(name) {
  return name.split(' ').slice(-2).map(w => w[0]).join('').toUpperCase() || 'SV';
}

function renderAvatarEl() {
  const wraps = [document.getElementById('avatarImg'), document.getElementById('heroAvatar')].filter(Boolean);
  if (!wraps.length) return;
  const content = studentAvatarDataUrl && studentAvatarDataUrl.startsWith('data:image/')
    ? `<img src="${studentAvatarDataUrl}" alt="Avatar"/>`
    : getInitials(currentStudent?.name || '');
  wraps.forEach(wrap => { wrap.innerHTML = content; });
}

function getStatusText(status) {
  return FBU.studentStatusLabel[status]?.label || status || 'Hoạt động';
}

function getProjectProgress(project, grade) {
  if (grade) return 'Đã có điểm';
  if (!project) return 'Chưa có đồ án';
  if (project.submitted || project.submissionLink) return 'Đã nộp bài';
  return FBU.statusLabel[project.status]?.label || 'Đang thực hiện';
}

function formatDateText(value) {
  if (!value) return 'Chưa cập nhật';
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? value : date.toLocaleDateString('vi-VN');
}

function updateAvatarPreview() {
  const initials = getInitials(currentStudent?.name || '');
  const sidebar = document.getElementById('sidebarAvatar');
  if (sidebar) sidebar.textContent = initials;
}

function handleAvatarFile(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => { studentAvatarDataUrl = ev.target.result; renderAvatarEl(); };
  reader.readAsDataURL(file);
}

function selectStatus(val) {
  document.querySelectorAll('.status-opt').forEach(opt => {
    const v = opt.dataset.val;
    opt.className = 'status-opt' + (v === val ? ` selected-${v}` : '');
  });
  document.getElementById('hiddenStatus').value = val;
}

function updateGPARing(gpa) {
  const circle = document.getElementById('gpaRingFill');
  if (!circle) return;
  const r = 48; const circ = 2 * Math.PI * r;
  const pct = Math.min(gpa / 4, 1);
  circle.setAttribute('stroke-dasharray', `${(pct * circ).toFixed(1)} ${circ}`);
}

function loadStudentProfile() {
  const session = getSessionData();
  if (!session) return;
  currentStudent = FBU.students.find(s => s.email === session.email);
  const out = document.getElementById('profileContent');
  if (!currentStudent) { out.innerHTML = '<p style="color:var(--text2)">Không tìm thấy thông tin.</p>'; return; }

  const project = currentStudent.projectId ? FBU.getProject(currentStudent.projectId) : null;
  const grade = project ? FBU.getApprovedGrade(project.id) : null;
  const initials = getInitials(currentStudent.name);
  const gpa = parseFloat(currentStudent.gpa) || 0;
  const r = 48; const circ = 2 * Math.PI * r;
  const teacher = project ? FBU.getTeacher(project.teacherId) : null;
  const statusLabel = getStatusText(currentStudent.status);
  const projectProgress = getProjectProgress(project, grade);
  const credits = currentStudent.credits || 0;
  const major = currentStudent.major || 'Công nghệ thông tin';

  document.getElementById('sidebarName').textContent = currentStudent.name;
  document.getElementById('sidebarAvatar').textContent = initials;

  out.innerHTML = `
    <div class="profile-hero">
      <div class="profile-hero-main">
        <div class="profile-hero-avatar" id="heroAvatar">${initials}</div>
        <div style="min-width:0">
          <div class="profile-hero-title">${currentStudent.name}</div>
          <div class="profile-hero-meta">
            <span><i class="fa-solid fa-id-card"></i>${currentStudent.id}</span>
            <span><i class="fa-solid fa-graduation-cap"></i>${currentStudent.class || 'Chưa cập nhật lớp'}</span>
            <span><i class="fa-solid fa-envelope"></i>${currentStudent.email}</span>
            <span><i class="fa-solid fa-circle-check"></i>${statusLabel}</span>
          </div>
        </div>
      </div>
      <div class="profile-hero-actions">
        <a class="btn btn-secondary" href="student-projects.html"><i class="fa-solid fa-folder-open"></i> Đồ án</a>
        <a class="btn btn-secondary" href="student-grading.html"><i class="fa-solid fa-star-half-stroke"></i> Điểm</a>
        <button class="btn btn-primary" onclick="saveStudentProfile()"><i class="fa-solid fa-floppy-disk"></i> Lưu hồ sơ</button>
      </div>
    </div>

    <div class="profile-metric-grid">
      <div class="profile-metric">
        <div class="profile-metric-icon"><i class="fa-solid fa-chart-simple"></i></div>
        <div><span class="profile-metric-value" style="color:var(--accent)">${gpa ? gpa.toFixed(2) : '—'}</span><span class="profile-metric-label">GPA tích lũy</span></div>
      </div>
      <div class="profile-metric">
        <div class="profile-metric-icon" style="background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.18);color:var(--green)"><i class="fa-solid fa-star-half-stroke"></i></div>
        <div><span class="profile-metric-value" style="color:${grade ? 'var(--green)' : 'var(--text3)'}">${grade ? grade.final : '—'}</span><span class="profile-metric-label">Điểm đồ án</span></div>
      </div>
      <div class="profile-metric">
        <div class="profile-metric-icon" style="background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.18);color:var(--yellow)"><i class="fa-solid fa-layer-group"></i></div>
        <div><span class="profile-metric-value" style="color:var(--yellow)">${credits || '—'}</span><span class="profile-metric-label">Tín chỉ</span></div>
      </div>
      <div class="profile-metric">
        <div class="profile-metric-icon" style="background:rgba(236,72,153,.12);border-color:rgba(236,72,153,.18);color:var(--pink)"><i class="fa-solid fa-diagram-project"></i></div>
        <div><span class="profile-metric-value" style="font-size:16px;color:var(--pink)">${projectProgress}</span><span class="profile-metric-label">Tiến độ hiện tại</span></div>
      </div>
    </div>

    <div class="profile-layout">
      <!-- Avatar Column -->
      <div class="avatar-card">
        <div class="avatar-ring">
          <svg class="avatar-ring-svg" viewBox="0 0 110 110">
            <circle class="avatar-ring-track" cx="55" cy="55" r="48"/>
            <circle class="avatar-ring-fill" cx="55" cy="55" r="48" stroke="var(--accent)" id="gpaRingFill"/>
          </svg>
          <div class="avatar-img" id="avatarImg">${initials}</div>
          <label class="avatar-upload-btn" title="Đổi ảnh">
            <i class="fa-solid fa-camera"></i>
            <input type="file" accept="image/*" style="display:none" onchange="handleAvatarFile(event)"/>
          </label>
        </div>
        <div class="avatar-name" id="avatarDisplayName">${currentStudent.name}</div>
        <div class="avatar-email">${currentStudent.email}</div>
        <div class="avatar-badge"><i class="fa-solid fa-user-graduate"></i> Sinh Viên</div>
        <div class="avatar-stats">
          <div class="av-stat">
            <span class="av-stat-num" style="color:var(--accent)">${currentStudent.gpa || '—'}</span>
            <span class="av-stat-lbl">GPA</span>
          </div>
          <div class="av-stat">
            <span class="av-stat-num" style="color:${grade ? 'var(--green)' : 'var(--text3)'}">${grade ? grade.final : '—'}</span>
            <span class="av-stat-lbl">Điểm ĐA</span>
          </div>
          <div class="av-stat full">
            <span class="av-stat-num">${currentStudent.class || 'Chưa cập nhật'}</span>
            <span class="av-stat-lbl">Lớp học</span>
          </div>
        </div>
        <div class="profile-detail-list">
          <div class="profile-detail-item"><i class="fa-solid fa-book-open"></i><span>${major}</span></div>
          <div class="profile-detail-item"><i class="fa-solid fa-phone"></i><span>${currentStudent.phone || 'Chưa cập nhật số điện thoại'}</span></div>
          <div class="profile-detail-item"><i class="fa-solid fa-cake-candles"></i><span>${formatDateText(currentStudent.dob)}</span></div>
          <div class="profile-detail-item"><i class="fa-solid fa-location-dot"></i><span>${currentStudent.address || 'Chưa cập nhật địa chỉ'}</span></div>
        </div>
      </div>

      <!-- Form Column -->
      <div class="form-card">
        <div class="form-section">
          <div class="form-section-header">
            <div class="form-section-icon"><i class="fa-solid fa-user-pen"></i></div>
            <div>
              <div class="form-section-title">Thông tin cá nhân</div>
              <div class="form-section-sub">Cập nhật thông tin hồ sơ của bạn</div>
            </div>
          </div>
          <div class="field-grid">
            <div class="sv-field">
              <label>Họ và tên</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-user"></i>
                <input class="sv-input" id="profileName" value="${currentStudent.name}" placeholder="Nhập họ tên..."/>
              </div>
            </div>
            <div class="sv-field">
              <label>Email</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-envelope"></i>
                <input class="sv-input" id="profileEmail" value="${currentStudent.email}" readonly/>
              </div>
            </div>
            <div class="sv-field">
              <label>Lớp học</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-chalkboard"></i>
                <input class="sv-input" id="profileClass" value="${currentStudent.class || ''}" placeholder="Ví dụ: CNTT01"/>
              </div>
            </div>
            <div class="sv-field">
              <label>GPA (0.0 – 4.0)</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-chart-simple"></i>
                <input class="sv-input" id="profileGpa" type="number" step="0.1" min="0" max="4" value="${currentStudent.gpa || ''}" placeholder="0.00 – 4.00" oninput="updateGPARing(parseFloat(this.value)||0)"/>
              </div>
            </div>
            <div class="sv-field">
              <label>Số điện thoại</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-phone"></i>
                <input class="sv-input" id="profilePhone" value="${currentStudent.phone || ''}" placeholder="Nhập số điện thoại..."/>
              </div>
            </div>
            <div class="sv-field">
              <label>Ngày sinh</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-calendar-day"></i>
                <input class="sv-input" id="profileDob" type="date" value="${currentStudent.dob || ''}"/>
              </div>
            </div>
            <div class="sv-field">
              <label>Chuyên ngành</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-book-open"></i>
                <input class="sv-input" id="profileMajor" value="${currentStudent.major || ''}" placeholder="Ví dụ: Kỹ thuật phần mềm"/>
              </div>
            </div>
            <div class="sv-field">
              <label>Tín chỉ</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-layer-group"></i>
                <input class="sv-input" id="profileCredits" type="number" min="0" value="${currentStudent.credits || ''}" placeholder="Số tín chỉ đã tích lũy"/>
              </div>
            </div>
            <div class="sv-field" style="grid-column:1/-1">
              <label>Địa chỉ</label>
              <div class="sv-input-wrap">
                <i class="sv-input-icon fa-solid fa-location-dot"></i>
                <input class="sv-input" id="profileAddress" value="${currentStudent.address || ''}" placeholder="Nhập địa chỉ liên hệ..."/>
              </div>
            </div>
            <div class="sv-field" style="grid-column:1/-1">
              <label>Ghi chú cá nhân</label>
              <textarea class="sv-input" id="profileNote" placeholder="Mục tiêu học tập, kỹ năng nổi bật hoặc ghi chú khác...">${currentStudent.note || ''}</textarea>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-header">
            <div class="form-section-icon"><i class="fa-solid fa-shield-halved"></i></div>
            <div>
              <div class="form-section-title">Trạng thái tài khoản</div>
              <div class="form-section-sub">Chọn trạng thái học tập hiện tại</div>
            </div>
          </div>
          <input type="hidden" id="hiddenStatus" value="${currentStudent.status || 'active'}"/>
          <div class="status-row">
            <div class="status-opt" data-val="active" onclick="selectStatus('active')">
              <i class="fa-solid fa-circle-check"></i> Hoạt Động
            </div>
            <div class="status-opt" data-val="warning" onclick="selectStatus('warning')">
              <i class="fa-solid fa-triangle-exclamation"></i> Cảnh Báo
            </div>
            <div class="status-opt" data-val="suspended" onclick="selectStatus('suspended')">
              <i class="fa-solid fa-ban"></i> Đình Chỉ
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-header">
            <div class="form-section-icon"><i class="fa-solid fa-folder-open"></i></div>
            <div>
              <div class="form-section-title">Đồ án hiện tại</div>
              <div class="form-section-sub">Thông tin đồ án được phân công</div>
            </div>
          </div>
          ${project ? `
            <div class="project-preview">
              <div class="project-preview-icon"><i class="fa-solid fa-diagram-project"></i></div>
              <div>
                <div class="project-preview-title">${project.title}</div>
                <div class="project-preview-meta">Mã: ${project.id} · Loại: ${project.category}</div>
              </div>
            </div>` :
            `<div style="font-size:13px;color:var(--text3);padding:14px;background:var(--bg3);border-radius:12px">
               <i class="fa-solid fa-folder-plus" style="margin-right:8px;color:var(--text3)"></i>
               Chưa được phân công đồ án.
             </div>`
          }
        </div>

        <div class="form-actions">
          <div class="form-actions-left">
            <div class="save-ok" id="saveOk"><i class="fa-solid fa-circle-check"></i> Đã lưu thành công</div>
            <div class="save-hint" id="saveHint">Nhấn "Lưu" để cập nhật thông tin</div>
          </div>
          <button class="btn btn-secondary" onclick="loadStudentProfile()">
            <i class="fa-solid fa-rotate-left"></i> Làm mới
          </button>
          <button class="btn btn-primary" onclick="saveStudentProfile()">
            <i class="fa-solid fa-floppy-disk"></i> Lưu hồ sơ
          </button>
        </div>
      </div>
    </div>`;

  studentAvatarDataUrl = currentStudent.avatar || null;
  renderAvatarEl();
  // Set status highlight
  selectStatus(currentStudent.status || 'active');
  // Animate GPA ring
  setTimeout(() => updateGPARing(gpa), 100);
}

function saveStudentProfile() {
  if (!currentStudent) return;
  const name = document.getElementById('profileName').value.trim();
  const cls = document.getElementById('profileClass').value.trim();
  const gpaVal = document.getElementById('profileGpa').value;
  const status = document.getElementById('hiddenStatus').value;
  const phone = document.getElementById('profilePhone').value.trim();
  const dob = document.getElementById('profileDob').value;
  const major = document.getElementById('profileMajor').value.trim();
  const creditsVal = document.getElementById('profileCredits').value;
  const address = document.getElementById('profileAddress').value.trim();
  const note = document.getElementById('profileNote').value.trim();
  if (!name) { showToast('Vui lòng nhập họ tên.', 'error'); return; }
  const gpa = gpaVal ? parseFloat(gpaVal) : currentStudent.gpa;
  const credits = creditsVal ? parseInt(creditsVal, 10) : currentStudent.credits;
  currentStudent.name = name;
  currentStudent.class = cls;
  currentStudent.gpa = isNaN(gpa) ? currentStudent.gpa : gpa;
  currentStudent.status = status;
  currentStudent.phone = phone;
  currentStudent.dob = dob;
  currentStudent.major = major;
  currentStudent.credits = Number.isNaN(credits) ? currentStudent.credits : credits;
  currentStudent.address = address;
  currentStudent.note = note;
  if (studentAvatarDataUrl) currentStudent.avatar = studentAvatarDataUrl;
  FBU.save();
  if (typeof API !== 'undefined' && getAuthToken()) {
    API.updateStudentProfile({
      name: currentStudent.name,
      class: currentStudent.class,
      gpa: currentStudent.gpa,
      status: currentStudent.status,
      avatar: currentStudent.avatar || '',
      phone: currentStudent.phone || '',
      dob: currentStudent.dob || '',
      major: currentStudent.major || '',
      credits: currentStudent.credits || 0,
      address: currentStudent.address || '',
      note: currentStudent.note || '',
    }).catch(err => showToast(err.message || 'Không thể lưu hồ sơ lên server.', 'error'));
  }
  // Update session
  const session = getSessionData();
  if (session && session.email === currentStudent.email) {
    const updated = { ...session, name };
    ['fbu_session'].forEach(k => {
      if (localStorage.getItem(k)) localStorage.setItem(k, JSON.stringify(updated));
      if (sessionStorage.getItem(k)) sessionStorage.setItem(k, JSON.stringify(updated));
    });
    setLoggedInUser && setLoggedInUser();
  }
  // Show inline success
  document.getElementById('saveHint').style.display = 'none';
  const ok = document.getElementById('saveOk');
  ok.classList.add('show');
  setTimeout(() => { ok.classList.remove('show'); document.getElementById('saveHint').style.display = ''; }, 3000);
  // Update sidebar + avatar
  document.getElementById('sidebarName').textContent = name;
  document.getElementById('sidebarAvatar').textContent = getInitials(name);
  document.getElementById('avatarDisplayName').textContent = name;
  renderAvatarEl();
}

document.addEventListener('DOMContentLoaded', () => onFbuReady(loadStudentProfile));
</script>
</body>
</html>
