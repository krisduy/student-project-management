<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đồ Án – FBU</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 18px;
      }
      .proj-card {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition:
          transform 0.2s,
          box-shadow 0.2s,
          border-color 0.2s;
        cursor: pointer;
      }
      .proj-card:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow);
        border-color: rgba(79, 110, 247, 0.3);
      }
      .proj-card-top {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 8px;
      }
      .proj-title {
        font-family: "Syne", sans-serif;
        font-weight: 700;
        font-size: 15px;
        line-height: 1.3;
      }
      .proj-cat {
        font-size: 11px;
        color: var(--text2);
        background: var(--bg3);
        padding: 3px 10px;
        border-radius: 20px;
        white-space: nowrap;
      }
      .proj-desc {
        font-size: 12px;
        color: var(--text2);
        line-height: 1.6;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .proj-meta {
        display: flex;
        gap: 16px;
        font-size: 12px;
        color: var(--text2);
      }
      .proj-meta i {
        margin-right: 5px;
        color: var(--text3);
      }
      .proj-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .score-badge {
        font-family: "Syne", sans-serif;
        font-size: 22px;
        font-weight: 800;
        color: var(--green);
      }
      .view-toggle {
        display: flex;
        gap: 4px;
      }
      .view-btn {
        width: 32px;
        height: 32px;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .view-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="logo-mark">F</div>
          <div class="logo-text">
            <span class="logo-name">FBU</span
            ><span class="logo-sub">Project System</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <a href="index.html" class="nav-item"
            ><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a
          >
          <a href="students.html" class="nav-item"
            ><i class="fa-solid fa-user-graduate"></i><span>Sinh Viên</span></a
          >
          <a href="projects.html" class="nav-item active"
            ><i class="fa-solid fa-folder-open"></i><span>Đồ Án</span></a
          >
          <a href="teachers.html" class="nav-item"
            ><i class="fa-solid fa-chalkboard-user"></i
            ><span>Giảng Viên</span></a
          >
          <a href="grading.html" class="nav-item"
            ><i class="fa-solid fa-star-half-stroke"></i
            ><span>Duyệt Điểm</span></a
          >
          <a href="accounts.html" class="nav-item"
            ><i class="fa-solid fa-users-gear"></i><span>Tài Khoản</span></a
          >
          <a href="reports.html" class="nav-item"
            ><i class="fa-solid fa-chart-pie"></i><span>Báo Cáo</span></a
          >
        </nav>
        <div class="sidebar-user">
          <div class="user-avatar">AD</div>
          <div class="user-info">
            <span class="user-name">Admin FBU</span
            ><span class="user-role">Quản trị viên</span>
          </div>
          <button
            class="btn btn-secondary"
            style="width: 100%; margin-top: 8px"
            onclick="logout()"
          >
            Đăng xuất
          </button>
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-bar">
          <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="top-bar-title">
            <h1>Quản Lý Đồ Án</h1>
            <p>Tất cả đề tài đồ án học kỳ này</p>
          </div>
          <div class="top-bar-actions">
            <button class="btn btn-primary" onclick="openModal('modalProject')">
              <i class="fa-solid fa-plus"></i> Thêm Đồ Án
            </button>
          </div>
        </header>

        <div class="page-body">
          <div class="toolbar">
            <div class="toolbar-left">
              <div class="search-bar" style="flex: 1; max-width: 360px">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Tìm tên đồ án..."
                  oninput="filterProjects()"
                />
              </div>
              <select
                class="form-control"
                id="filterStatus"
                onchange="filterProjects()"
                style="width: 160px"
              >
                <option value="">Tất cả trạng thái</option>
                <option value="completed">Hoàn Thành</option>
                <option value="in-progress">Đang Thực Hiện</option>
                <option value="pending">Chờ Duyệt</option>
              </select>
              <select
                class="form-control"
                id="filterCat"
                onchange="filterProjects()"
                style="width: 140px"
              >
                <option value="">Tất cả loại</option>
              </select>
            </div>
            <div class="toolbar-right">
              <div class="view-toggle">
                <button
                  class="view-btn active"
                  id="btnGrid"
                  onclick="setView('grid')"
                >
                  <i class="fa-solid fa-grip"></i>
                </button>
                <button class="view-btn" id="btnList" onclick="setView('list')">
                  <i class="fa-solid fa-list"></i>
                </button>
              </div>
              <span
                id="resultCount"
                style="font-size: 13px; color: var(--text2); align-self: center"
              ></span>
            </div>
          </div>

          <div id="projectGrid" class="project-grid"></div>
          <div
            id="projectList"
            style="display: none"
            class="card"
            style="padding: 0"
          >
            <div class="tbl-wrap">
              <table>
                <thead>
                  <tr>
                    <th>Mã ĐA</th>
                    <th>Tên Đồ Án</th>
                    <th>Loại</th>
                    <th>Sinh Viên</th>
                    <th>GVHD</th>
                    <th>Deadline</th>
                    <th>Trạng Thái</th>
                    <th>Điểm</th>
                    <th>Thao Tác</th>
                  </tr>
                </thead>
                <tbody id="projectListBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Modal Thêm / Sửa Đồ Án -->
    <div class="modal-overlay" id="modalProject">
      <div class="modal" style="width: 600px">
        <div class="modal-header">
          <h3 id="modalTitle">Thêm Đồ Án</h3>
          <button class="modal-close" onclick="closeModal('modalProject')">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <input type="hidden" id="editId" />
        <div class="form-group">
          <label>Tên Đồ Án *</label
          ><input
            class="form-control"
            id="fTitle"
            placeholder="Tên đề tài..."
          />
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px">
          <div class="form-group">
            <label>Loại *</label>
            <select class="form-control" id="fCategory"></select>
          </div>
          <div class="form-group">
            <label>Giảng Viên HD *</label>
            <select class="form-control" id="fTeacher"></select>
          </div>
          <div class="form-group">
            <label>Ngày Bắt Đầu</label>
            <input class="form-control" id="fStart" type="date" />
          </div>
          <div class="form-group">
            <label>Deadline *</label>
            <input class="form-control" id="fDeadline" type="date" />
          </div>
          <div class="form-group">
            <label>Trạng Thái</label>
            <select class="form-control" id="fStatus">
              <option value="pending">Chờ Duyệt</option>
              <option value="in-progress">Đang Thực Hiện</option>
              <option value="completed">Hoàn Thành</option>
              <option value="failed">Không Đạt</option>
            </select>
          </div>
          <div class="form-group">
            <label>Điểm Số (nếu có)</label>
            <input
              class="form-control"
              id="fScore"
              type="number"
              step="0.1"
              min="0"
              max="10"
              placeholder="—"
            />
          </div>
        </div>
        <div class="form-group">
          <label>Mô Tả</label
          ><textarea
            class="form-control"
            id="fDesc"
            rows="3"
            placeholder="Mô tả đề tài..."
          ></textarea>
        </div>
        <div class="modal-footer">
          <button
            class="btn btn-secondary"
            onclick="closeModal('modalProject')"
          >
            Hủy
          </button>
          <button class="btn btn-primary" onclick="saveProject()">
            <i class="fa-solid fa-floppy-disk"></i> Lưu
          </button>
        </div>
      </div>
    </div>

    <!-- Modal Chi Tiết -->
    <div class="modal-overlay" id="modalDetail">
      <div class="modal" style="width: 580px">
        <div class="modal-header">
          <h3>Chi Tiết Đồ Án</h3>
          <button class="modal-close" onclick="closeModal('modalDetail')">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
        <div id="detailContent"></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="closeModal('modalDetail')">
            Đóng
          </button>
          <button class="btn btn-primary" id="editFromDetail">Chỉnh Sửa</button>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/projects.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
