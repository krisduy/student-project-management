<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Duyệt Điểm – FBU</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      .grading-layout {
        display: grid;
        grid-template-columns: 360px 1fr;
        gap: 20px;
      }
      @media (max-width: 900px) {
        .grading-layout {
          grid-template-columns: 1fr;
        }
      }
      .proj-list-panel {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .proj-list-item {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .proj-list-item:hover,
      .proj-list-item.selected {
        border-color: var(--accent);
        background: rgba(79, 110, 247, 0.08);
      }
      .proj-list-item.selected {
        border-left: 3px solid var(--accent);
      }
      .pli-title {
        font-weight: 600;
        font-size: 14px;
        line-height: 1.3;
      }
      .pli-meta {
        font-size: 12px;
        color: var(--text2);
        margin-top: 4px;
      }
      .grade-panel {
        background: var(--bg2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
      }
      .score-row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }
      .score-row label {
        width: 140px;
        font-size: 13px;
        color: var(--text2);
        flex-shrink: 0;
        font-weight: 600;
      }
      .score-slider {
        flex: 1;
      }
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 6px;
        background: var(--bg3);
        border-radius: 4px;
        outline: none;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 18px;
        height: 18px;
        background: var(--accent);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.2);
      }
      .score-val {
        width: 52px;
        height: 36px;
        text-align: center;
        background: var(--bg3);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-weight: 700;
        font-family: "Syne", sans-serif;
        font-size: 16px;
      }
      .final-score-display {
        background: linear-gradient(
          135deg,
          rgba(79, 110, 247, 0.15),
          rgba(124, 58, 237, 0.1)
        );
        border: 1px solid rgba(79, 110, 247, 0.3);
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        margin-top: 20px;
      }
      .final-score-num {
        font-family: "Syne", sans-serif;
        font-size: 52px;
        font-weight: 800;
        color: var(--accent);
        line-height: 1;
      }
      .grade-letter {
        font-size: 16px;
        font-weight: 700;
        margin-top: 8px;
      }
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 300px;
        color: var(--text2);
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <div class="logo-mark">F</div>
          <div class="logo-text">
            <span class="logo-name">FBU</span
            ><span class="logo-sub">Project System</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <a href="index.html" class="nav-item"
            ><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a
          >
          <a href="students.html" class="nav-item"
            ><i class="fa-solid fa-user-graduate"></i><span>Sinh Viên</span></a
          >
          <a href="projects.html" class="nav-item"
            ><i class="fa-solid fa-folder-open"></i><span>Đồ Án</span></a
          >
          <a href="teachers.html" class="nav-item"
            ><i class="fa-solid fa-chalkboard-user"></i
            ><span>Giảng Viên</span></a
          >
          <a href="grading.html" class="nav-item active"
            ><i class="fa-solid fa-star-half-stroke"></i
            ><span>Duyệt Điểm</span></a
          >
          <a href="accounts.html" class="nav-item"
            ><i class="fa-solid fa-users-gear"></i><span>Tài Khoản</span></a
          >
          <a href="reports.html" class="nav-item"
            ><i class="fa-solid fa-chart-pie"></i><span>Báo Cáo</span></a
          >
        </nav>
        <div class="sidebar-user">
          <div class="user-avatar">AD</div>
          <div class="user-info">
            <span class="user-name">Admin FBU</span
            ><span class="user-role">Quản trị viên</span>
          </div>
          <button
            class="btn btn-secondary"
            style="width: 100%; margin-top: 8px"
            onclick="logout()"
          >
            Đăng xuất
          </button>
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
      </aside>

      <main class="main-content">
        <header class="top-bar">
          <button class="menu-toggle" onclick="toggleSidebar()">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="top-bar-title">
            <h1>Duyệt Điểm Đồ Án</h1>
            <p>Duyệt và quản lý điểm số đồ án</p>
          </div>
        </header>

        <div class="page-body">
          <!-- Filter -->
          <div class="toolbar" style="margin-bottom: 20px">
            <div class="toolbar-left">
              <div class="search-bar" style="flex: 1; max-width: 300px">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input
                  type="text"
                  id="searchInput"
                  placeholder="Tìm đồ án..."
                  oninput="filterList()"
                />
              </div>
              <select
                class="form-control"
                id="filterStatus"
                onchange="filterList()"
                style="width: 160px"
              >
                <option value="">Tất cả</option>
                <option value="pending">Chờ Admin Duyệt</option>
                <option value="graded">Đã Chấm</option>
                <option value="ungraded">Chưa Chấm</option>
                <option value="rejected">Bị Trả Lại</option>
              </select>
            </div>
          </div>

          <div class="grading-layout">
            <!-- Left: project list -->
            <div>
              <div class="proj-list-panel" id="projList"></div>
            </div>
            <!-- Right: grading form -->
            <div id="gradeRight">
              <div class="grade-panel">
                <div class="empty-state" id="emptyState">
                  <i
                    class="fa-solid fa-pen-to-square"
                    style="font-size: 40px"
                  ></i>
                  <span>Chọn một đồ án để duyệt điểm</span>
                </div>
                <div id="gradeForm" style="display: none">
                  <div class="card-header" style="margin-bottom: 24px">
                    <div>
                      <h2 id="gTitle"></h2>
                      <p
                        style="
                          font-size: 12px;
                          color: var(--text2);
                          margin-top: 4px;
                        "
                        id="gSub"
                      ></p>
                    </div>
                    <span class="tag" id="gStatus"></span>
                  </div>

                  <!-- Score components -->
                  <div class="score-row">
                    <label
                      ><i
                        class="fa-solid fa-tasks"
                        style="margin-right: 6px; color: var(--accent)"
                      ></i
                      >Quá Trình</label
                    >
                    <div class="score-slider">
                      <input
                        type="range"
                        id="sProcess"
                        min="0"
                        max="10"
                        step="0.5"
                        disabled
                      />
                    </div>
                    <input
                      type="number"
                      class="score-val"
                      id="vProcess"
                      min="0"
                      max="10"
                      step="0.5"
                      disabled
                    />
                  </div>
                  <div class="score-row">
                    <label
                      ><i
                        class="fa-solid fa-file-lines"
                        style="margin-right: 6px; color: var(--yellow)"
                      ></i
                      >Báo Cáo</label
                    >
                    <div class="score-slider">
                      <input
                        type="range"
                        id="sReport"
                        min="0"
                        max="10"
                        step="0.5"
                        disabled
                      />
                    </div>
                    <input
                      type="number"
                      class="score-val"
                      id="vReport"
                      min="0"
                      max="10"
                      step="0.5"
                      disabled
                    />
                  </div>
                  <div class="score-row">
                    <label
                      ><i
                        class="fa-solid fa-person-chalkboard"
                        style="margin-right: 6px; color: var(--pink)"
                      ></i
                      >Bảo Vệ</label
                    >
                    <div class="score-slider">
                      <input
                        type="range"
                        id="sDefense"
                        min="0"
                        max="10"
                        step="0.5"
                        disabled
                      />
                    </div>
                    <input
                      type="number"
                      class="score-val"
                      id="vDefense"
                      min="0"
                      max="10"
                      step="0.5"
                      disabled
                    />
                  </div>

                  <div class="form-group" style="margin-top: 4px">
                    <label>Nhận Xét</label>
                    <textarea
                      class="form-control"
                      id="gNote"
                      rows="3"
                      placeholder="Chưa có nhận xét từ giảng viên..."
                      disabled
                    ></textarea>
                  </div>

                  <!-- Final score -->
                  <div class="final-score-display">
                    <div
                      style="
                        font-size: 13px;
                        color: var(--text2);
                        margin-bottom: 8px;
                      "
                    >
                      Điểm Tổng Kết
                    </div>
                    <div class="final-score-num" id="finalScore">0.0</div>
                    <div class="grade-letter" id="gradeLetter"></div>
                    <div
                      style="
                        font-size: 11px;
                        color: var(--text2);
                        margin-top: 6px;
                      "
                    >
                      Quá trình 30% · Báo cáo 30% · Bảo vệ 40%
                    </div>
                  </div>

                  <div
                    style="
                      display: flex;
                      justify-content: flex-end;
                      gap: 10px;
                      margin-top: 20px;
                    "
                  >
                    <button class="btn btn-primary" id="approveBtn" onclick="approveSelectedGrade()">
                      <i class="fa-solid fa-circle-check"></i> Duyệt Điểm
                    </button>
                    <button class="btn btn-secondary" id="rejectBtn" style="color: var(--red)" onclick="rejectSelectedGrade()">
                      <i class="fa-solid fa-rotate-left"></i> Trả Lại
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/data.js"></script>
    <script src="/js/grading.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
