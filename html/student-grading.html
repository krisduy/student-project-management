<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Điểm Của Tôi – FBU Student Portal</title>
  <link rel="stylesheet" href="/css/main.css"/>
  <link rel="stylesheet" href="/css/dashboard.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    /* ─── Score Hero ─── */
    .score-hero {
      position: relative; overflow: hidden;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 24px; padding: 36px;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 36px; flex-wrap: wrap;
    }
    .score-hero-top-bar {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: var(--ring-color, linear-gradient(90deg, var(--accent), var(--accent2)));
    }
    .score-hero::before {
      content: '';
      position: absolute; top: -60px; right: -60px;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(91,124,246,0.1), transparent 70%);
      border-radius: 50%; pointer-events: none;
    }

    /* Score Ring */
    .score-ring-wrap {
      position: relative; width: 160px; height: 160px; flex-shrink: 0;
    }
    .score-ring-svg { width: 160px; height: 160px; transform: rotate(-90deg); }
    .score-ring-track { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 12; }
    .score-ring-fill { fill: none; stroke-width: 12; stroke-linecap: round; transition: stroke-dasharray 1.4s cubic-bezier(.4,0,.2,1); }
    .score-ring-glow { fill: none; stroke-width: 20; stroke-linecap: round; opacity: 0.15; filter: blur(8px); }

    .score-ring-label {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .score-ring-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 42px; font-weight: 700; line-height: 1;
      letter-spacing: -1px;
    }
    .score-ring-denom { font-size: 13px; color: var(--text3); font-weight: 500; }

    /* Score Info */
    .score-hero-info { flex: 1; min-width: 0; }
    .score-project-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px; font-weight: 600; margin-bottom: 10px;
      line-height: 1.3; letter-spacing: -0.3px;
    }
    .score-meta-row {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-bottom: 18px;
    }
    .score-meta-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 12px; border-radius: 20px;
      font-size: 12px; font-weight: 500;
      background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
    }
    .score-meta-pill i { font-size: 11px; color: var(--text3); }

    .score-grade-badge {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 10px 22px; border-radius: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px; font-weight: 700;
    }
    .score-grade-letter {
      font-size: 28px; font-weight: 700; line-height: 1;
    }
    .score-grade-text { display: flex; flex-direction: column; gap: 1px; }
    .score-grade-label { font-size: 10px; opacity: 0.7; letter-spacing: 1px; text-transform: uppercase; }

    /* ─── Score Breakdown ─── */
    .score-breakdown {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 20px;
    }
    @media(max-width:700px){ .score-breakdown { grid-template-columns: 1fr; } }

    .score-item {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 24px;
      position: relative; overflow: hidden;
      transition: transform .2s, border-color .2s;
    }
    .score-item:hover { transform: translateY(-3px); border-color: var(--border2); }
    .score-item-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .score-item.process .score-item-accent { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .score-item.report .score-item-accent { background: linear-gradient(90deg, var(--yellow), var(--orange)); }
    .score-item.defense .score-item-accent { background: linear-gradient(90deg, var(--pink), var(--accent2)); }

    .score-item-icon {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; margin-bottom: 16px;
    }
    .score-item.process .score-item-icon { background: rgba(91,124,246,.12); color: var(--accent); }
    .score-item.report .score-item-icon { background: rgba(245,158,11,.12); color: var(--yellow); }
    .score-item.defense .score-item-icon { background: rgba(236,72,153,.12); color: var(--pink); }

    .score-item-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text3); margin-bottom: 10px;
    }
    .score-item-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 44px; font-weight: 700; line-height: 1;
      letter-spacing: -1px; margin-bottom: 4px;
    }
    .score-item.process .score-item-num { color: var(--accent); }
    .score-item.report .score-item-num { color: var(--yellow); }
    .score-item.defense .score-item-num { color: var(--pink); }

    .score-item-weight {
      font-size: 11px; color: var(--text3); margin-bottom: 16px;
    }

    /* Score bar */
    .score-bar-track {
      height: 4px; background: var(--bg3); border-radius: 4px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%; border-radius: 4px;
      transition: width 1.4s cubic-bezier(.4,0,.2,1);
    }
    .score-item.process .score-bar-fill { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
    .score-item.report .score-bar-fill { background: linear-gradient(90deg, var(--yellow), var(--orange)); }
    .score-item.defense .score-bar-fill { background: linear-gradient(90deg, var(--pink), var(--accent2)); }

    /* Score segments label */
    .score-segments {
      display: flex; justify-content: space-between;
      margin-top: 6px;
    }
    .score-seg { font-size: 10px; color: var(--text3); }

    /* ─── Feedback ─── */
    .feedback-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 20px; padding: 26px;
    }
    .feedback-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 18px;
    }
    .feedback-icon {
      width: 40px; height: 40px; border-radius: 11px;
      background: rgba(91,124,246,.1); border: 1px solid rgba(91,124,246,.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); font-size: 18px;
    }
    .feedback-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; }
    .feedback-sub { font-size: 12px; color: var(--text3); }
    .feedback-quote {
      position: relative;
      background: var(--bg3); border-radius: 14px;
      padding: 20px 22px; padding-left: 28px;
      font-size: 14px; color: var(--text2); line-height: 1.8; font-style: italic;
      border-left: 3px solid var(--accent);
    }
    .feedback-quote::before {
      content: '\201C';
      position: absolute; top: 10px; left: 16px;
      font-size: 30px; color: var(--accent); font-style: normal; line-height: 1; opacity: 0.5;
    }

    /* ─── Empty / Pending States ─── */
    .state-card {
      text-align: center; padding: 72px 32px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px;
    }
    .state-icon-wrap {
      width: 80px; height: 80px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; margin: 0 auto 22px;
    }
    .state-icon-wrap.yellow { background: rgba(245,158,11,.1); color: var(--yellow); border: 1px solid rgba(245,158,11,.15); }
    .state-icon-wrap.blue { background: rgba(91,124,246,.1); color: var(--accent); border: 1px solid rgba(91,124,246,.15); }
    .state-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600; margin-bottom: 10px; }
    .state-sub { font-size: 14px; color: var(--text2); max-width: 360px; margin: 0 auto; }
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">F</div>
      <div class="logo-text">
        <span class="logo-name">FBU</span>
        <span class="logo-sub">Student Portal</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <span class="nav-section-label">Menu</span>
      <a href="student.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Trang chính</span></a>
      <a href="student-projects.html" class="nav-item"><i class="fa-solid fa-folder-open"></i><span>Đồ Án của tôi</span></a>
      <a href="student-grading.html" class="nav-item active"><i class="fa-solid fa-star-half-stroke"></i><span>Điểm của tôi</span></a>
      <a href="student-profile.html" class="nav-item"><i class="fa-solid fa-user"></i><span>Hồ sơ</span></a>
    </nav>
    <div class="sidebar-user">
      <div class="sidebar-user-inner">
        <div class="user-avatar">SV</div>
        <div class="user-info">
          <span class="user-name">Sinh Viên</span>
          <span class="user-role">Student</span>
        </div>
      </div>
      <button class="btn btn-secondary" style="width:100%;justify-content:center" onclick="logout()">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất
      </button>
    </div>
  </aside>

  <main class="main-content">
    <header class="top-bar">
      <button class="menu-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div class="top-bar-title">
        <h1>Điểm Của Tôi</h1>
        <p>Kết quả học tập và nhận xét giảng viên</p>
      </div>
    </header>

    <div class="page-body">
      <div id="gradeContent"></div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
    <script src="/js/data.js"></script>
<script src="/js/main.js"></script>
<script>
function getGradeInfo(score) {
  if (score >= 9.0) return { letter: 'A+', label: 'Xuất sắc', color: '#10B981', bg: 'rgba(16,185,129,0.12)', border: 'rgba(16,185,129,0.25)' };
  if (score >= 8.0) return { letter: 'A',  label: 'Giỏi',     color: '#10B981', bg: 'rgba(16,185,129,0.12)', border: 'rgba(16,185,129,0.25)' };
  if (score >= 7.0) return { letter: 'B+', label: 'Khá giỏi', color: '#5B7CF6', bg: 'rgba(91,124,246,0.12)', border: 'rgba(91,124,246,0.25)' };
  if (score >= 6.5) return { letter: 'B',  label: 'Khá',      color: '#5B7CF6', bg: 'rgba(91,124,246,0.12)', border: 'rgba(91,124,246,0.25)' };
  if (score >= 5.5) return { letter: 'C+', label: 'Trung bình khá', color: '#F59E0B', bg: 'rgba(245,158,11,0.12)', border: 'rgba(245,158,11,0.25)' };
  if (score >= 5.0) return { letter: 'C',  label: 'Trung bình', color: '#F59E0B', bg: 'rgba(245,158,11,0.12)', border: 'rgba(245,158,11,0.25)' };
  if (score >= 4.0) return { letter: 'D',  label: 'Yếu',      color: '#F97316', bg: 'rgba(249,115,22,0.12)', border: 'rgba(249,115,22,0.25)' };
  return { letter: 'F', label: 'Không đạt', color: '#F43F5E', bg: 'rgba(244,63,94,0.12)', border: 'rgba(244,63,94,0.25)' };
}

function buildRing(score) {
  const r = 64; const circ = 2 * Math.PI * r;
  return { circ, dash: ((Math.min(score / 10, 1)) * circ).toFixed(1) };
}

document.addEventListener('DOMContentLoaded', () => onFbuReady(() => {
  const session = getSessionData();
  if (!session) return;
  const student = FBU.students.find(s => s.email === session.email);
  const out = document.getElementById('gradeContent');

  if (!student) { out.innerHTML = '<p style="color:var(--text2)">Không tìm thấy thông tin.</p>'; return; }

  const project = student.projectId ? FBU.getProject(student.projectId) : null;
  if (!project) {
    out.innerHTML = `
      <div class="state-card">
        <div class="state-icon-wrap blue"><i class="fa-solid fa-folder-open"></i></div>
        <div class="state-title">Chưa có đồ án</div>
        <div class="state-sub">Bạn chưa có đồ án được gán. Hãy đăng ký đề tài trước.</div>
      </div>`;
    return;
  }

  const grade = FBU.getApprovedGrade(project.id);
  if (!grade) {
    out.innerHTML = `
      <div class="state-card">
        <div class="state-icon-wrap yellow"><i class="fa-solid fa-clock"></i></div>
        <div class="state-title">Điểm chưa được duyệt</div>
        <div class="state-sub">Kết quả sẽ hiển thị tại đây sau khi admin duyệt điểm từ giảng viên.</div>
      </div>`;
    return;
  }

  const final = parseFloat(grade.final) || 0;
  const gInfo = getGradeInfo(final);
  const teacher = FBU.getTeacher(project.teacherId);
  const { circ, dash } = buildRing(final);

  out.innerHTML = `
    <div class="score-hero">
      <div class="score-hero-top-bar" style="background:${gInfo.color}"></div>
      <div class="score-ring-wrap">
        <svg class="score-ring-svg" viewBox="0 0 160 160">
          <circle class="score-ring-track" cx="80" cy="80" r="64"/>
          <circle class="score-ring-glow" cx="80" cy="80" r="64" stroke="${gInfo.color}" stroke-dasharray="0 ${circ}" id="ringGlow"/>
          <circle class="score-ring-fill" cx="80" cy="80" r="64" stroke="${gInfo.color}" stroke-dasharray="0 ${circ}" id="ringFill"/>
        </svg>
        <div class="score-ring-label">
          <span class="score-ring-num" style="color:${gInfo.color}">${grade.final}</span>
          <span class="score-ring-denom">/ 10.0</span>
        </div>
      </div>
      <div class="score-hero-info">
        <h2 class="score-project-title">${project.title}</h2>
        <div class="score-meta-row">
          <span class="score-meta-pill"><i class="fa-solid fa-user-tie"></i>${teacher ? teacher.name : 'Chưa có'}</span>
          <span class="score-meta-pill"><i class="fa-solid fa-hashtag"></i>${project.id}</span>
          <span class="score-meta-pill"><i class="fa-solid fa-tag"></i>${project.category}</span>
        </div>
        <div class="score-grade-badge" style="background:${gInfo.bg};border:1px solid ${gInfo.border};color:${gInfo.color}">
          <span class="score-grade-letter">${gInfo.letter}</span>
          <div class="score-grade-text">
            <span class="score-grade-label">Xếp loại</span>
            <span style="font-size:14px;font-weight:700">${gInfo.label}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="score-breakdown">
      <div class="score-item process">
        <div class="score-item-accent"></div>
        <div class="score-item-icon"><i class="fa-solid fa-clipboard-list"></i></div>
        <div class="score-item-label">Quá trình</div>
        <div class="score-item-num" id="numProcess">0</div>
        <div class="score-item-weight">Trọng số <strong>30%</strong></div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:0%" id="barProcess"></div>
        </div>
        <div class="score-segments">
          <span class="score-seg">0</span><span class="score-seg">5</span><span class="score-seg">10</span>
        </div>
      </div>
      <div class="score-item report">
        <div class="score-item-accent"></div>
        <div class="score-item-icon"><i class="fa-solid fa-file-lines"></i></div>
        <div class="score-item-label">Báo cáo</div>
        <div class="score-item-num" id="numReport">0</div>
        <div class="score-item-weight">Trọng số <strong>30%</strong></div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:0%" id="barReport"></div>
        </div>
        <div class="score-segments">
          <span class="score-seg">0</span><span class="score-seg">5</span><span class="score-seg">10</span>
        </div>
      </div>
      <div class="score-item defense">
        <div class="score-item-accent"></div>
        <div class="score-item-icon"><i class="fa-solid fa-person-chalkboard"></i></div>
        <div class="score-item-label">Bảo vệ</div>
        <div class="score-item-num" id="numDefense">0</div>
        <div class="score-item-weight">Trọng số <strong>40%</strong></div>
        <div class="score-bar-track">
          <div class="score-bar-fill" style="width:0%" id="barDefense"></div>
        </div>
        <div class="score-segments">
          <span class="score-seg">0</span><span class="score-seg">5</span><span class="score-seg">10</span>
        </div>
      </div>
    </div>

    ${grade.note ? `
    <div class="feedback-card">
      <div class="feedback-header">
        <div class="feedback-icon"><i class="fa-regular fa-comment-dots"></i></div>
        <div>
          <div class="feedback-title">Nhận xét của giảng viên</div>
          <div class="feedback-sub">${teacher ? teacher.name : ''}</div>
        </div>
      </div>
      <div class="feedback-quote">${grade.note}</div>
    </div>` : ''}`;

  // Animate
  requestAnimationFrame(() => {
    setTimeout(() => {
      document.getElementById('ringFill').setAttribute('stroke-dasharray', `${dash} ${circ}`);
      document.getElementById('ringGlow').setAttribute('stroke-dasharray', `${dash} ${circ}`);
      const pPct = (parseFloat(grade.process)/10*100).toFixed(0);
      const rPct = (parseFloat(grade.report)/10*100).toFixed(0);
      const dPct = (parseFloat(grade.defense)/10*100).toFixed(0);
      document.getElementById('barProcess').style.width = pPct + '%';
      document.getElementById('barReport').style.width = rPct + '%';
      document.getElementById('barDefense').style.width = dPct + '%';

      // Count up numbers
      function countUp(el, target, duration) {
        const start = performance.now();
        const update = (time) => {
          const p = Math.min((time - start) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          el.textContent = (ease * target).toFixed(1);
          if (p < 1) requestAnimationFrame(update);
          else el.textContent = target.toFixed(1);
        };
        requestAnimationFrame(update);
      }
      countUp(document.getElementById('numProcess'), parseFloat(grade.process), 1200);
      countUp(document.getElementById('numReport'), parseFloat(grade.report), 1200);
      countUp(document.getElementById('numDefense'), parseFloat(grade.defense), 1200);
    }, 100);
  });
}));
</script>
</body>
</html>
