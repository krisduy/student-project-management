services:
  app:
    build: .
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/fbu_project
      JWT_SECRET: fbu_super_secret_key_change_in_production
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  seed:
    build: .
    profiles:
      - seed
    environment:
      MONGODB_URI: mongodb://mongo:27017/fbu_project
      JWT_SECRET: fbu_super_secret_key_change_in_production
    command: ["npm", "run", "seed"]
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
