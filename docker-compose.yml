services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://mongo:27017/student_project_management
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  seed:
    build: .
    profiles:
      - seed
    command: ["npm", "run", "seed"]
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
